<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and manage your AuthVault profile information.">
    <title>AuthVault</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body>

    <!-- Grid Background -->
    <div class="grid-bg"></div>
    <div class="radial-glow"></div>

    <!-- Loader Overlay -->
    <div class="loader-overlay" id="loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-shield-lock-fill"></i> AuthVault
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <i class="bi bi-list" style="color: var(--text-primary); font-size: 1.5rem;"></i>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><i class="bi bi-house-door"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="profile.html"><i class="bi bi-person-circle"></i> Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="navLogout"><i class="bi bi-box-arrow-right"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Profile Section -->
    <div class="auth-wrapper" style="padding-top: 90px;">
        <div class="container" style="max-width: 680px;">
            <div class="profile-card">

                <!-- Profile Header -->
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">?</div>
                    <div class="profile-info">
                        <h3 id="profileName">Loading...</h3>
                        <p id="profileEmail">loading...</p>
                        <span class="badge-token"><i class="bi bi-shield-check"></i> Authenticated</span>
                    </div>
                </div>

                <!-- Profile Form -->
                <div class="profile-section-title">
                    <i class="bi bi-pencil-square"></i> Profile Details
                </div>

                <form id="profileForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="number" class="form-control" id="profileAge" placeholder="Age" min="1"
                                    max="150">
                                <label for="profileAge"><i class="bi bi-calendar3"></i> Age</label>
                                <div class="field-error" id="errorAge"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="date" class="form-control" id="profileDob" placeholder="Date of Birth">
                                <label for="profileDob"><i class="bi bi-calendar-event"></i> Date of Birth</label>
                                <div class="field-error" id="errorDob"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-floating">
                        <input type="tel" class="form-control" id="profileContact" placeholder="Contact Number"
                            pattern="[0-9]{7,15}">
                        <label for="profileContact"><i class="bi bi-telephone"></i> Contact Number</label>
                        <div class="field-error" id="errorContact"></div>
                    </div>

                    <!-- Actions -->
                    <div class="profile-actions">
                        <button type="submit" class="btn btn-primary-custom flex-grow-1" id="btnUpdateProfile">
                            <i class="bi bi-check-circle"></i> Save Changes
                        </button>
                        <button type="button" class="btn btn-danger-custom" id="btnLogout">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS + jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
