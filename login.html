<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your AuthVault account to access your profile.">
    <title>Login — AuthVault</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Grid Background -->
    <div class="grid-bg"></div>
    <div class="radial-glow"></div>

    <!-- Loader Overlay -->
    <div class="loader-overlay" id="loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-shield-lock-fill"></i> AuthVault
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <i class="bi bi-list" style="color: var(--text-primary); font-size: 1.5rem;"></i>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><i class="bi bi-house-door"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html"><i class="bi bi-person-plus"></i> Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="login.html"><i class="bi bi-box-arrow-in-right"></i> Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="auth-wrapper" style="padding-top: 90px;">
        <div class="auth-card">
            <h2><i class="bi bi-box-arrow-in-right"></i> Welcome Back</h2>
            <p class="subtitle">Sign in to access your profile and manage your data.</p>

            <form id="loginForm" novalidate>
                <!-- Lockout Warning -->
                <div class="lockout-warning" id="lockoutWarning">
                    <i class="bi bi-shield-exclamation"></i>
                    <span id="lockoutMessage"></span>
                </div>

                <div class="form-floating">
                    <input type="email" class="form-control" id="loginEmail" placeholder="Email Address" required autocomplete="email">
                    <label for="loginEmail"><i class="bi bi-envelope"></i> Email Address</label>
                    <div class="field-error" id="errorEmail"></div>
                </div>

                <div class="form-floating password-wrapper">
                    <input type="password" class="form-control" id="loginPassword" placeholder="Password" required autocomplete="current-password">
                    <label for="loginPassword"><i class="bi bi-lock"></i> Password</label>
                    <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                    <div class="field-error" id="errorPassword"></div>
                </div>

                <button type="submit" class="btn btn-primary-custom" id="btnLogin">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html" class="auth-link">Create One</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS + jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
