<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new AuthVault account to manage your profile securely.">
    <title>Register — AuthVault</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Grid Background -->
    <div class="grid-bg"></div>
    <div class="radial-glow"></div>

    <!-- Loader Overlay -->
    <div class="loader-overlay" id="loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-shield-lock-fill"></i> AuthVault
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <i class="bi bi-list" style="color: var(--text-primary); font-size: 1.5rem;"></i>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><i class="bi bi-house-door"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="register.html"><i class="bi bi-person-plus"></i> Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html"><i class="bi bi-box-arrow-in-right"></i> Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Register Form -->
    <div class="auth-wrapper" style="padding-top: 90px;">
        <div class="auth-card">
            <h2><i class="bi bi-person-plus-fill"></i> Create Account</h2>
            <p class="subtitle">Join AuthVault and secure your digital identity.</p>

            <form id="registerForm" novalidate>
                <div class="form-floating">
                    <input type="text" class="form-control" id="regName" placeholder="Full Name" required autocomplete="name">
                    <label for="regName"><i class="bi bi-person"></i> Full Name</label>
                    <div class="field-error" id="errorName"></div>
                </div>

                <div class="form-floating">
                    <input type="email" class="form-control" id="regEmail" placeholder="Email Address" required autocomplete="email">
                    <label for="regEmail"><i class="bi bi-envelope"></i> Email Address</label>
                    <div class="field-error" id="errorEmail"></div>
                </div>

                <div class="form-floating password-wrapper">
                    <input type="password" class="form-control" id="regPassword" placeholder="Password" required autocomplete="new-password">
                    <label for="regPassword"><i class="bi bi-lock"></i> Password</label>
                    <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                    <div class="field-error" id="errorPassword"></div>
                </div>

                <!-- Password Strength Meter -->
                <div class="password-strength" id="strengthContainer" style="display:none;">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <span class="strength-text" id="strengthText"></span>
                </div>

                <div class="form-floating password-wrapper">
                    <input type="password" class="form-control" id="regConfirmPassword" placeholder="Confirm Password" required autocomplete="new-password">
                    <label for="regConfirmPassword"><i class="bi bi-lock-fill"></i> Confirm Password</label>
                    <button type="button" class="password-toggle" id="toggleConfirmPassword" aria-label="Toggle confirm password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                    <div class="field-error" id="errorConfirmPassword"></div>
                </div>

                <button type="submit" class="btn btn-primary-custom" id="btnRegister">
                    <i class="bi bi-check-circle"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Sign In</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS + jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
